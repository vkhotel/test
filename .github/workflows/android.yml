name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Java (required by the Android Gradle Plugin)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Fetch packages first: as a side effect this writes
      # android/local.properties (with flutter.sdk=... etc.), which
      # android/settings.gradle needs to even be evaluated - it must exist
      # before we can run any Gradle command below, including "wrapper".
      - name: Fetch packages
        run: flutter pub get

      # gradle-wrapper.jar is a binary file and can't be committed to
      # source, so android/gradlew doesn't exist in this repo yet - generate
      # a real one here, matching the Gradle version this project expects.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate the Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aerotouch-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
