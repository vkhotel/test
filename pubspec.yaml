name: aerotouch
description: >
  AeroTouch turns an Android phone into a high-precision wireless motion
  mouse for Windows, macOS, and Linux using IMU sensor fusion and low
  latency WebSocket streaming.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  # --- State management / DI ---------------------------------------------
  flutter_riverpod: ^3.0.0

  # --- Networking -----------------------------------------------------------
  web_socket_channel: ^3.0.1
  network_info_plus: ^6.1.3

  # --- Sensors / hardware -----------------------------------------------------
  sensors_plus: ^6.1.1
  battery_plus: ^6.2.1
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.8

  # --- Persistence ------------------------------------------------------------
  shared_preferences: ^2.3.2

  # --- UI / design --------------------------------------------------------
  google_fonts: ^6.2.1
  equatable: ^2.0.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Uncomment and add real asset files if you supply custom launcher icons.
  # assets:
  #   - assets/icon/
